# ==========================================
# Browser Config
# ==========================================
browser=chrome
headless=false

# ==========================================
# Execution Mode (ONLY SWITCH NEEDED)
# ==========================================
execution.mode=local

# ==========================================
# BrowserStack Hub & Credentials (ENV Driven)
# ==========================================
browserstack.hub.url=https://hub-cloud.browserstack.com/wd/hub
browserstack.username=${BROWSERSTACK_USERNAME}
browserstack.access.key=${BROWSERSTACK_ACCESS_KEY}

# ==========================================
# BrowserStack Capabilities
# ==========================================
browserstack.os=Windows
browserstack.os.version=11
browserstack.browser.version=latest
browserstack.project.name=Parabank Playwright Framework
browserstack.build.name=Local BrowserStack Build
browserstack.session.name=Parabank Playwright Session
browserstack.local=false
browserstack.debug=true
browserstack.network.logs=true
browserstack.console.logs=errors

# ==========================================
# Wait Configurations
# ==========================================
implicit.wait=5
explicit.wait=20
page.load.timeout=30
script.timeout=30

# ==========================================
# UI Behavior
# ==========================================
highlight.elements=false
take.screenshot.on.pass=false
take.screenshot.on.fail=true

# ==========================================
# Base URLs
# ==========================================
base.url=https://parabank.parasoft.com/parabank
api.base.url=https://parabank.parasoft.com/parabank/services_proxy/bank

# ==========================================
# Parallel Execution
# ==========================================
thread.count=3
data.provider.thread.count=3
parallel.mode=methods

# ==========================================
# Retry Mechanism
# ==========================================
retry.enabled=true
retry.count=1
retry.delay.seconds=1

# ==========================================
# Smart Wait / Resilience
# ==========================================
smart.wait.polling.millis=500
resilient.find.retries=2
resilient.find.delay.millis=300

# ==========================================
# API Timeouts
# ==========================================
api.connect.timeout.seconds=15
api.read.timeout.seconds=30

# ==========================================
# Startup Validation
# ==========================================
startup.validation.enabled=true
startup.validation.timeout.seconds=10

# ==========================================
# Playwright Config
# ==========================================
playwright.slow.mo.millis=0
playwright.browser.launch.timeout.millis=30000
playwright.action.timeout.millis=10000
playwright.navigation.timeout.millis=30000

playwright.trace.enabled=true
playwright.trace.screenshots=true
playwright.trace.snapshots=true
playwright.trace.sources=true

playwright.video.enabled=false
playwright.video.width=1280
playwright.video.height=720

playwright.viewport.width=1440
playwright.viewport.height=900

playwright.accept.downloads=true
playwright.ignore.https.errors=false

# ==========================================
# Artifact Cleanup
# ==========================================
artifact.cleanup.enabled=true
artifact.cleanup.directories=test-output/reports,test-output/screenshots,test-output/traces,test-output/videos,test-output/allure-results,test-output/allure-report