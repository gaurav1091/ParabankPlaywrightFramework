# ==========================================
# Environment Config
# ==========================================
env=dev
base.url=https://parabank.parasoft.com/parabank
api.base.url=https://parabank.parasoft.com/parabank/services_proxy/bank

username=${PARABANK_USERNAME}
password=${PARABANK_PASSWORD}

# ==========================================
# Execution
# ==========================================
execution.mode=local

# ==========================================
# BrowserStack (Used only when execution.mode=remote)
# ==========================================
browserstack.os=OS X
browserstack.os.version=Ventura
browserstack.browser.version=latest

browserstack.project.name=Parabank Automation
browserstack.build.name=Dev Hybrid Run
browserstack.session.name=Dev Hybrid Test

browserstack.debug=true
browserstack.network.logs=true
browserstack.console.logs=info