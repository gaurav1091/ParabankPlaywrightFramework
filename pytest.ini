[pytest]
minversion = 8.0
testpaths = src/test/python
pythonpath =
    src/main/python
    src/test/python

python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

addopts =
    -ra
    --strict-markers
    --tb=short

markers =
    smoke: Smoke test suite
    regression: Regression test suite
    ui: UI test suite
    api: API test suite
    hybrid: Hybrid test suite
    serial: Tests that must not run in parallel
    stateful: Tests that depend on state

log_cli = true
log_cli_level = INFO