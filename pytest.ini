[pytest]
minversion = 8.0

testpaths = src/test/python
pythonpath =
    src/main/python
    src/test/python

python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -ra
    --strict-markers
    --tb=short
    --html=test-output/reports/report.html
    --alluredir=test-output/allure-results

markers =
    smoke: Smoke tests
    regression: Regression tests
    sanity: Sanity and framework health tests
    ui: UI tests
    api: API tests
    integration: Integration tests

log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s | %(levelname)-8s | %(name)s | %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

reruns = 1
reruns_delay = 1