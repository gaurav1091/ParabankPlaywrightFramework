[pytest]

minversion = 8.0

# Test discovery
testpaths = src/test/python
pythonpath =
    src/main/python
    src/test/python

python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s | %(levelname)-8s | %(name)s | %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Reports
addopts =
    -ra
    --strict-markers
    --tb=short
    --html=test-output/reports/report.html
    --self-contained-html
    --alluredir=test-output/allure-results

# Retry configuration (default)
reruns = 1
reruns_delay = 1

# Markers
markers =
    smoke: Smoke tests
    regression: Regression tests
    ui: UI tests
    api: API tests
    integration: Integration tests