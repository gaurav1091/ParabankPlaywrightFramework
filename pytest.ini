[pytest]
minversion = 8.0

testpaths = src/test/python
pythonpath =
    src/main/python
    src/test/python

python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -ra
    --strict-markers
    --tb=short
    --html=test-output/reports/report.html
    --alluredir=test-output/allure-results

markers =
    smoke: Stable, business-critical tests that validate the most important user journeys
    regression: Broad functional coverage tests intended for deeper validation of the application
    sanity: Basic framework and application health validation tests
    ui: UI-only tests
    api: API-only tests
    hybrid: UI + API integrated validation tests
    integration: Broader integration-level tests
    manual: Tests excluded from normal automation runs unless explicitly included
    quarantined: Temporarily isolated unstable or flaky tests excluded from default suite runs
    serial: Tests that should not run in parallel
    slow: Long-running tests that may be excluded from fast feedback cycles
    login: Login-related tests
    negative: Negative-path tests
    positive: Positive-path tests
    billpay: Bill Pay-related tests
    findtransactions: Find Transactions-related tests
    accounts: Accounts-related tests
    transferfunds: Transfer Funds-related tests
    opennewaccount: Open New Account-related tests
    api_authenticated: Browser-backed authenticated API setup tests

log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s | %(levelname)-8s | %(name)s | %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S