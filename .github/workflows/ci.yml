name: Parabank CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:
    inputs:
      suite:
        description: "Suite to run"
        required: true
        default: "smoke"
        type: choice
        options:
          - smoke
          - regression
          - sanity
          - ui
          - api
          - hybrid
      environment:
        description: "Execution environment"
        required: true
        default: "qa"
        type: choice
        options:
          - qa
          - stage
          - dev
      browser:
        description: "Browser"
        required: true
        default: "chrome"
        type: choice
        options:
          - chrome
          - firefox
          - edge
      execution_mode:
        description: "Execution target"
        required: true
        default: "local"
        type: choice
        options:
          - local
          - remote

concurrency:
  group: parabank-ci-${{ github.ref }}-${{ github.event.inputs.suite || 'smoke' }}-${{ github.event.inputs.execution_mode || 'local' }}
  cancel-in-progress: true

jobs:
  parabank-tests:
    name: Run Parabank tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      PARABANK_USERNAME: ${{ secrets.PARABANK_USERNAME }}
      PARABANK_PASSWORD: ${{ secrets.PARABANK_PASSWORD }}
      BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
      BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Show Python version
        run: python --version

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install project dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers and system dependencies
        run: python -m playwright install --with-deps

      - name: Resolve runtime inputs
        id: runtime
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "suite=${{ github.event.inputs.suite }}" >> "$GITHUB_OUTPUT"
            echo "environment=${{ github.event.inputs.environment }}" >> "$GITHUB_OUTPUT"
            echo "browser=${{ github.event.inputs.browser }}" >> "$GITHUB_OUTPUT"
            echo "execution_mode=${{ github.event.inputs.execution_mode }}" >> "$GITHUB_OUTPUT"
          else
            echo "suite=smoke" >> "$GITHUB_OUTPUT"
            echo "environment=qa" >> "$GITHUB_OUTPUT"
            echo "browser=chrome" >> "$GITHUB_OUTPUT"
            echo "execution_mode=local" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate BrowserStack secrets
        if: ${{ steps.runtime.outputs.execution_mode == 'remote' }}
        shell: bash
        run: |
          if [ -z "${BROWSERSTACK_USERNAME}" ]; then
            echo "BROWSERSTACK_USERNAME is missing."
            exit 1
          fi

          if [ -z "${BROWSERSTACK_ACCESS_KEY}" ]; then
            echo "BROWSERSTACK_ACCESS_KEY is missing."
            exit 1
          fi

      - name: Build BrowserStack metadata
        id: browserstack_meta
        if: ${{ steps.runtime.outputs.execution_mode == 'remote' }}
        shell: bash
        run: |
          SAFE_REF="${GITHUB_REF_NAME//\//-}"
          BUILD_NAME="gha-${{ steps.runtime.outputs.suite }}-${SAFE_REF}-run-${GITHUB_RUN_NUMBER}"
          SESSION_NAME="${{ steps.runtime.outputs.suite }}-${{ steps.runtime.outputs.browser }}-${{ github.run_attempt }}"
          echo "build_name=${BUILD_NAME}" >> "$GITHUB_OUTPUT"
          echo "session_name=${SESSION_NAME}" >> "$GITHUB_OUTPUT"

      - name: Run selected suite
        shell: bash
        run: |
          SUITE="${{ steps.runtime.outputs.suite }}"
          ENVIRONMENT="${{ steps.runtime.outputs.environment }}"
          BROWSER="${{ steps.runtime.outputs.browser }}"
          EXECUTION_MODE="${{ steps.runtime.outputs.execution_mode }}"

          echo "Running suite      : ${SUITE}"
          echo "Environment        : ${ENVIRONMENT}"
          echo "Browser            : ${BROWSER}"
          echo "Execution Mode     : ${EXECUTION_MODE}"

          EXTRA_ARGS=()
          EXTRA_ARGS+=("--env=${ENVIRONMENT}")
          EXTRA_ARGS+=("--framework-browser=${BROWSER}")
          EXTRA_ARGS+=("--framework-headless=true")
          EXTRA_ARGS+=("--execution-mode=${EXECUTION_MODE}")

          if [ "${EXECUTION_MODE}" = "remote" ]; then
            EXTRA_ARGS+=("--remote-provider=browserstack")
            EXTRA_ARGS+=("--browserstack-build-name=${{ steps.browserstack_meta.outputs.build_name }}")
            EXTRA_ARGS+=("--browserstack-session-name=${{ steps.browserstack_meta.outputs.session_name }}")
          fi

          case "${SUITE}" in
            smoke)
              python src/test/python/runners/smoke_runner.py "${EXTRA_ARGS[@]}"
              ;;
            regression)
              python src/test/python/runners/regression_runner.py "${EXTRA_ARGS[@]}"
              ;;
            sanity)
              python src/test/python/runners/sanity_runner.py "${EXTRA_ARGS[@]}"
              ;;
            ui)
              python src/test/python/runners/ui_runner.py "${EXTRA_ARGS[@]}"
              ;;
            api)
              python src/test/python/runners/api_runner.py "${EXTRA_ARGS[@]}"
              ;;
            hybrid)
              python src/test/python/runners/hybrid_runner.py "${EXTRA_ARGS[@]}"
              ;;
            *)
              echo "Unsupported suite: ${SUITE}"
              exit 1
              ;;
          esac

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: html-report-${{ steps.runtime.outputs.suite }}-${{ steps.runtime.outputs.execution_mode }}-${{ github.run_number }}
          path: test-output/reports/
          if-no-files-found: warn
          retention-days: 7

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ steps.runtime.outputs.suite }}-${{ steps.runtime.outputs.execution_mode }}-${{ github.run_number }}
          path: test-output/allure-results/
          if-no-files-found: warn
          retention-days: 7

      - name: Upload traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: traces-${{ steps.runtime.outputs.suite }}-${{ steps.runtime.outputs.execution_mode }}-${{ github.run_number }}
          path: test-output/traces/
          if-no-files-found: warn
          retention-days: 7

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ steps.runtime.outputs.suite }}-${{ steps.runtime.outputs.execution_mode }}-${{ github.run_number }}
          path: test-output/screenshots/
          if-no-files-found: warn
          retention-days: 7

      - name: Publish workflow summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Parabank CI Summary"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Suite | ${{ steps.runtime.outputs.suite }} |"
            echo "| Environment | ${{ steps.runtime.outputs.environment }} |"
            echo "| Browser | ${{ steps.runtime.outputs.browser }} |"
            echo "| Execution Mode | ${{ steps.runtime.outputs.execution_mode }} |"
            if [ "${{ steps.runtime.outputs.execution_mode }}" = "remote" ]; then
              echo "| BrowserStack Build | ${{ steps.browserstack_meta.outputs.build_name }} |"
              echo "| BrowserStack Session | ${{ steps.browserstack_meta.outputs.session_name }} |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"