name: Parabank CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:
    inputs:
      suite:
        description: "Suite to run"
        required: true
        default: "smoke"
        type: choice
        options:
          - smoke
          - regression
          - sanity
          - ui
          - api
          - hybrid
      environment:
        description: "Execution environment"
        required: true
        default: "qa"
        type: choice
        options:
          - qa
          - stage
          - dev
      browser_mode:
        description: "Browser selection mode"
        required: true
        default: "single"
        type: choice
        options:
          - single
          - matrix
      browser_selection:
        description: "Browser or browser combination"
        required: true
        default: "chrome"
        type: choice
        options:
          - chrome
          - firefox
          - edge
          - chrome-firefox
          - chrome-edge
          - firefox-edge
          - chrome-firefox-edge
      execution_mode:
        description: "Execution mode"
        required: true
        default: "local"
        type: choice
        options:
          - local
          - remote
      workers:
        description: "Parallel workers per job"
        required: true
        default: "1"
        type: choice
        options:
          - "1"
          - "2"
          - "3"
          - "4"

concurrency:
  group: parabank-ci-${{ github.ref }}-${{ github.event_name }}-${{ github.event.inputs.suite || 'smoke' }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  prepare:
    name: Resolve runtime plan
    runs-on: ubuntu-latest
    outputs:
      suite: ${{ steps.plan.outputs.suite }}
      environment: ${{ steps.plan.outputs.environment }}
      execution_mode: ${{ steps.plan.outputs.execution_mode }}
      workers: ${{ steps.plan.outputs.workers }}
      browser_matrix: ${{ steps.plan.outputs.browser_matrix }}

    steps:
      - name: Resolve plan
        id: plan
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SUITE="${{ github.event.inputs.suite }}"
            ENVIRONMENT="${{ github.event.inputs.environment }}"
            BROWSER_MODE="${{ github.event.inputs.browser_mode }}"
            BROWSER_SELECTION="${{ github.event.inputs.browser_selection }}"
            EXECUTION_MODE="${{ github.event.inputs.execution_mode }}"
            WORKERS="${{ github.event.inputs.workers }}"
          else
            SUITE="smoke"
            ENVIRONMENT="qa"
            BROWSER_MODE="single"
            BROWSER_SELECTION="chrome"
            EXECUTION_MODE="local"
            WORKERS="1"
          fi

          case "${BROWSER_SELECTION}" in
            chrome)
              BROWSER_MATRIX='{"browser":["chrome"]}'
              ;;
            firefox)
              BROWSER_MATRIX='{"browser":["firefox"]}'
              ;;
            edge)
              BROWSER_MATRIX='{"browser":["edge"]}'
              ;;
            chrome-firefox)
              BROWSER_MATRIX='{"browser":["chrome","firefox"]}'
              ;;
            chrome-edge)
              BROWSER_MATRIX='{"browser":["chrome","edge"]}'
              ;;
            firefox-edge)
              BROWSER_MATRIX='{"browser":["firefox","edge"]}'
              ;;
            chrome-firefox-edge)
              BROWSER_MATRIX='{"browser":["chrome","firefox","edge"]}'
              ;;
            *)
              echo "Unsupported browser selection: ${BROWSER_SELECTION}"
              exit 1
              ;;
          esac

          if [ "${BROWSER_MODE}" = "single" ]; then
            case "${BROWSER_SELECTION}" in
              chrome|firefox|edge)
                ;;
              *)
                echo "browser_mode=single requires a single browser selection."
                exit 1
                ;;
            esac
          fi

          if [ "${BROWSER_MODE}" = "matrix" ]; then
            case "${BROWSER_SELECTION}" in
              chrome|firefox|edge|chrome-firefox|chrome-edge|firefox-edge|chrome-firefox-edge)
                ;;
              *)
                echo "browser_mode=matrix received unsupported browser selection."
                exit 1
                ;;
            esac
          fi

          echo "suite=${SUITE}" >> "$GITHUB_OUTPUT"
          echo "environment=${ENVIRONMENT}" >> "$GITHUB_OUTPUT"
          echo "execution_mode=${EXECUTION_MODE}" >> "$GITHUB_OUTPUT"
          echo "workers=${WORKERS}" >> "$GITHUB_OUTPUT"
          echo "browser_matrix=${BROWSER_MATRIX}" >> "$GITHUB_OUTPUT"

          echo "Resolved suite           : ${SUITE}"
          echo "Resolved environment     : ${ENVIRONMENT}"
          echo "Resolved execution mode  : ${EXECUTION_MODE}"
          echo "Resolved workers         : ${WORKERS}"
          echo "Resolved browser mode    : ${BROWSER_MODE}"
          echo "Resolved browser choice  : ${BROWSER_SELECTION}"
          echo "Resolved browser matrix  : ${BROWSER_MATRIX}"

  parabank-tests:
    name: Run ${{ needs.prepare.outputs.suite }} on ${{ matrix.browser }} (${{ needs.prepare.outputs.execution_mode }})
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.browser_matrix) }}

    env:
      PARABANK_USERNAME: ${{ secrets.PARABANK_USERNAME }}
      PARABANK_PASSWORD: ${{ secrets.PARABANK_PASSWORD }}
      BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
      BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Show Python version
        run: python --version

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install project dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers and system dependencies
        run: python -m playwright install --with-deps

      - name: Validate BrowserStack secrets
        if: ${{ needs.prepare.outputs.execution_mode == 'remote' }}
        shell: bash
        run: |
          if [ -z "${BROWSERSTACK_USERNAME}" ]; then
            echo "BROWSERSTACK_USERNAME is missing."
            exit 1
          fi

          if [ -z "${BROWSERSTACK_ACCESS_KEY}" ]; then
            echo "BROWSERSTACK_ACCESS_KEY is missing."
            exit 1
          fi

      - name: Build BrowserStack metadata
        id: browserstack_meta
        if: ${{ needs.prepare.outputs.execution_mode == 'remote' }}
        shell: bash
        run: |
          SAFE_REF="${GITHUB_REF_NAME//\//-}"
          SAFE_BROWSER="${{ matrix.browser }}"
          BUILD_NAME="gha-${{ needs.prepare.outputs.suite }}-${SAFE_BROWSER}-${SAFE_REF}-run-${GITHUB_RUN_NUMBER}"
          SESSION_NAME="${{ needs.prepare.outputs.suite }}-${SAFE_BROWSER}-attempt-${GITHUB_RUN_ATTEMPT}"
          PROJECT_NAME="Parabank Playwright Framework - GHA"

          echo "project_name=${PROJECT_NAME}" >> "$GITHUB_OUTPUT"
          echo "build_name=${BUILD_NAME}" >> "$GITHUB_OUTPUT"
          echo "session_name=${SESSION_NAME}" >> "$GITHUB_OUTPUT"

      - name: Run selected suite
        shell: bash
        run: |
          SUITE="${{ needs.prepare.outputs.suite }}"
          ENVIRONMENT="${{ needs.prepare.outputs.environment }}"
          BROWSER="${{ matrix.browser }}"
          EXECUTION_MODE="${{ needs.prepare.outputs.execution_mode }}"
          WORKERS="${{ needs.prepare.outputs.workers }}"

          echo "Running suite      : ${SUITE}"
          echo "Environment        : ${ENVIRONMENT}"
          echo "Browser            : ${BROWSER}"
          echo "Execution Mode     : ${EXECUTION_MODE}"
          echo "Workers            : ${WORKERS}"

          EXTRA_ARGS=()
          EXTRA_ARGS+=("--env=${ENVIRONMENT}")
          EXTRA_ARGS+=("--framework-browser=${BROWSER}")
          EXTRA_ARGS+=("--framework-headless=true")
          EXTRA_ARGS+=("--execution-mode=${EXECUTION_MODE}")

          if [ "${EXECUTION_MODE}" = "remote" ]; then
            EXTRA_ARGS+=("--remote-provider=browserstack")
            EXTRA_ARGS+=("--browserstack-project-name=${{ steps.browserstack_meta.outputs.project_name }}")
            EXTRA_ARGS+=("--browserstack-build-name=${{ steps.browserstack_meta.outputs.build_name }}")
            EXTRA_ARGS+=("--browserstack-session-name=${{ steps.browserstack_meta.outputs.session_name }}")
          fi

          if [ "${WORKERS}" != "1" ]; then
            EXTRA_ARGS+=("-n")
            EXTRA_ARGS+=("${WORKERS}")
            EXTRA_ARGS+=("--dist=loadfile")
          fi

          case "${SUITE}" in
            smoke)
              python src/test/python/runners/smoke_runner.py "${EXTRA_ARGS[@]}"
              ;;
            regression)
              python src/test/python/runners/regression_runner.py "${EXTRA_ARGS[@]}"
              ;;
            sanity)
              python src/test/python/runners/sanity_runner.py "${EXTRA_ARGS[@]}"
              ;;
            ui)
              python src/test/python/runners/ui_runner.py "${EXTRA_ARGS[@]}"
              ;;
            api)
              python src/test/python/runners/api_runner.py "${EXTRA_ARGS[@]}"
              ;;
            hybrid)
              python src/test/python/runners/hybrid_runner.py "${EXTRA_ARGS[@]}"
              ;;
            *)
              echo "Unsupported suite: ${SUITE}"
              exit 1
              ;;
          esac

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: html-report-${{ needs.prepare.outputs.suite }}-${{ matrix.browser }}-${{ needs.prepare.outputs.execution_mode }}-${{ github.run_number }}
          path: test-output/reports/
          if-no-files-found: warn
          retention-days: 7

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ needs.prepare.outputs.suite }}-${{ matrix.browser }}-${{ needs.prepare.outputs.execution_mode }}-${{ github.run_number }}
          path: test-output/allure-results/
          if-no-files-found: warn
          retention-days: 7

      - name: Upload traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: traces-${{ needs.prepare.outputs.suite }}-${{ matrix.browser }}-${{ needs.prepare.outputs.execution_mode }}-${{ github.run_number }}
          path: test-output/traces/
          if-no-files-found: warn
          retention-days: 7

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ needs.prepare.outputs.suite }}-${{ matrix.browser }}-${{ needs.prepare.outputs.execution_mode }}-${{ github.run_number }}
          path: test-output/screenshots/
          if-no-files-found: warn
          retention-days: 7

      - name: Publish workflow summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Parabank CI Summary"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Suite | ${{ needs.prepare.outputs.suite }} |"
            echo "| Environment | ${{ needs.prepare.outputs.environment }} |"
            echo "| Browser | ${{ matrix.browser }} |"
            echo "| Execution Mode | ${{ needs.prepare.outputs.execution_mode }} |"
            echo "| Workers | ${{ needs.prepare.outputs.workers }} |"
            if [ "${{ needs.prepare.outputs.execution_mode }}" = "remote" ]; then
              echo "| BrowserStack Project | ${{ steps.browserstack_meta.outputs.project_name }} |"
              echo "| BrowserStack Build | ${{ steps.browserstack_meta.outputs.build_name }} |"
              echo "| BrowserStack Session | ${{ steps.browserstack_meta.outputs.session_name }} |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  publish-pages:
    name: Publish HTML report to GitHub Pages
    needs:
      - prepare
      - parabank-tests
    if: ${{ github.event_name != 'pull_request' && needs.parabank-tests.result == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Download HTML report artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-html-reports
          pattern: html-report-${{ needs.prepare.outputs.suite }}-*-${{ needs.prepare.outputs.execution_mode }}-${{ github.run_number }}

      - name: Build Pages site content
        shell: bash
        run: |
          set -euo pipefail

          SITE_DIR="site"
          RUN_NUMBER="${{ github.run_number }}"
          SUITE="${{ needs.prepare.outputs.suite }}"
          ENVIRONMENT="${{ needs.prepare.outputs.environment }}"
          EXECUTION_MODE="${{ needs.prepare.outputs.execution_mode }}"
          RUN_DIR="${SITE_DIR}/reports/run-${RUN_NUMBER}"
          LATEST_DIR="${SITE_DIR}/reports/latest"

          mkdir -p "${RUN_DIR}"
          mkdir -p "${SITE_DIR}/reports"

          shopt -s nullglob
          for artifact_dir in downloaded-html-reports/*; do
            artifact_name="$(basename "${artifact_dir}")"
            browser="$(echo "${artifact_name}" | awk -F- '{print $(NF-2)}')"
            target_dir="${RUN_DIR}/${browser}"

            mkdir -p "${target_dir}"
            cp -R "${artifact_dir}/." "${target_dir}/"
          done

          rm -rf "${LATEST_DIR}"
          mkdir -p "${LATEST_DIR}"
          cp -R "${RUN_DIR}/." "${LATEST_DIR}/"

          cat > "${RUN_DIR}/index.html" <<EOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Parabank Report - Run ${RUN_NUMBER}</title>
            <style>
              body { font-family: Arial, sans-serif; margin: 40px; background: #f7f7f7; color: #222; }
              h1 { margin-bottom: 8px; }
              p { margin-top: 0; }
              ul { line-height: 1.9; }
              a { color: #0b57d0; text-decoration: none; }
              a:hover { text-decoration: underline; }
              .card { background: #fff; padding: 24px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); max-width: 900px; }
            </style>
          </head>
          <body>
            <div class="card">
              <h1>Parabank Playwright Report</h1>
              <p><strong>Run:</strong> ${RUN_NUMBER}</p>
              <p><strong>Suite:</strong> ${SUITE}</p>
              <p><strong>Environment:</strong> ${ENVIRONMENT}</p>
              <p><strong>Execution Mode:</strong> ${EXECUTION_MODE}</p>
              <h2>Browser Reports</h2>
              <ul>
          EOF

          for browser_dir in "${RUN_DIR}"/*; do
            if [ -d "${browser_dir}" ]; then
              browser_name="$(basename "${browser_dir}")"
              echo "        <li><a href=\"./${browser_name}/report.html\">${browser_name}</a></li>" >> "${RUN_DIR}/index.html"
            fi
          done

          cat >> "${RUN_DIR}/index.html" <<EOF
              </ul>
              <p><a href="../latest/">Go to Latest Report</a></p>
            </div>
          </body>
          </html>
          EOF

          cat > "${SITE_DIR}/index.html" <<EOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Parabank Reports</title>
            <style>
              body { font-family: Arial, sans-serif; margin: 40px; background: #f7f7f7; color: #222; }
              h1 { margin-bottom: 8px; }
              p { margin-top: 0; }
              ul { line-height: 1.9; }
              a { color: #0b57d0; text-decoration: none; }
              a:hover { text-decoration: underline; }
              .card { background: #fff; padding: 24px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); max-width: 900px; }
            </style>
          </head>
          <body>
            <div class="card">
              <h1>Parabank Playwright Reports</h1>
              <ul>
                <li><a href="./reports/latest/">Latest Report</a></li>
                <li><a href="./reports/run-${RUN_NUMBER}/">Run ${RUN_NUMBER}</a></li>
              </ul>
            </div>
          </body>
          </html>
          EOF

      - name: Deploy reports to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          keep_files: true

      - name: Add Pages link to workflow summary
        shell: bash
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER_NAME="${GITHUB_REPOSITORY_OWNER}"
          RUN_URL="https://${OWNER_NAME}.github.io/${REPO_NAME}/reports/run-${{ github.run_number }}/"

          {
            echo ""
            echo "## GitHub Pages Report"
            echo ""
            echo "| Link | URL |"
            echo "|---|---|"
            echo "| Run Report | ${RUN_URL} |"
          } >> "$GITHUB_STEP_SUMMARY"