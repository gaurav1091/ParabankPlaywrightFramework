name: Parabank CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:
    inputs:
      suite:
        description: "Suite to run"
        required: true
        default: "smoke"
        type: choice
        options:
          - smoke
          - regression
          - sanity
          - ui
          - api
          - hybrid
      environment:
        description: "Execution environment"
        required: true
        default: "qa"
        type: choice
        options:
          - qa
          - stage
          - dev
      browser_mode:
        description: "Browser selection mode"
        required: true
        default: "single"
        type: choice
        options:
          - single
          - matrix
      browser_selection:
        description: "Browser or browser combination"
        required: true
        default: "chrome"
        type: choice
        options:
          - chrome
          - firefox
          - edge
          - chrome-firefox
          - chrome-edge
          - firefox-edge
          - chrome-firefox-edge
      execution_mode:
        description: "Execution mode"
        required: true
        default: "local"
        type: choice
        options:
          - local
          - remote
      workers:
        description: "Parallel workers per job"
        required: true
        default: "1"
        type: choice
        options:
          - "1"
          - "2"
          - "3"
          - "4"
  schedule:
    - cron: "0 3 20 * *"

concurrency:
  group: parabank-ci-${{ github.ref }}-${{ github.event_name }}-${{ github.event.inputs.suite || 'scheduled' }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality-gate:
    name: Quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Show Python version
        run: python --version

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install project dependencies
        run: pip install -r requirements.txt

      - name: Validate Black formatting
        run: black --check .

      - name: Validate isort import order
        run: isort --check-only .

      - name: Run Flake8
        run: flake8 --config=config/flake8 .

      - name: Run Pylint on framework source
        shell: bash
        run: |
          pylint --rcfile=config/pylint \
            src/main/python/com/parabank/automation \
            src/test/python

  prepare:
    name: Resolve runtime plan
    runs-on: ubuntu-latest
    needs: quality-gate
    outputs:
      suite: ${{ steps.plan.outputs.suite }}
      environment: ${{ steps.plan.outputs.environment }}
      execution_mode: ${{ steps.plan.outputs.execution_mode }}
      workers: ${{ steps.plan.outputs.workers }}
      browser_matrix: ${{ steps.plan.outputs.browser_matrix }}

    steps:
      - name: Resolve plan
        id: plan
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            SUITE="regression"
            ENVIRONMENT="qa"
            BROWSER_MODE="matrix"
            BROWSER_SELECTION="chrome-firefox"
            EXECUTION_MODE="local"
            WORKERS="1"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SUITE="${{ github.event.inputs.suite }}"
            ENVIRONMENT="${{ github.event.inputs.environment }}"
            BROWSER_MODE="${{ github.event.inputs.browser_mode }}"
            BROWSER_SELECTION="${{ github.event.inputs.browser_selection }}"
            EXECUTION_MODE="${{ github.event.inputs.execution_mode }}"
            WORKERS="${{ github.event.inputs.workers }}"
          else
            SUITE="smoke"
            ENVIRONMENT="qa"
            BROWSER_MODE="single"
            BROWSER_SELECTION="chrome"
            EXECUTION_MODE="local"
            WORKERS="1"
          fi

          case "${BROWSER_SELECTION}" in
            chrome)
              BROWSER_MATRIX='{"browser":["chrome"]}'
              ;;
            firefox)
              BROWSER_MATRIX='{"browser":["firefox"]}'
              ;;
            edge)
              BROWSER_MATRIX='{"browser":["edge"]}'
              ;;
            chrome-firefox)
              BROWSER_MATRIX='{"browser":["chrome","firefox"]}'
              ;;
            chrome-edge)
              BROWSER_MATRIX='{"browser":["chrome","edge"]}'
              ;;
            firefox-edge)
              BROWSER_MATRIX='{"browser":["firefox","edge"]}'
              ;;
            chrome-firefox-edge)
              BROWSER_MATRIX='{"browser":["chrome","firefox","edge"]}'
              ;;
            *)
              echo "Unsupported browser selection: ${BROWSER_SELECTION}"
              exit 1
              ;;
          esac

          if [ "${BROWSER_MODE}" = "single" ]; then
            case "${BROWSER_SELECTION}" in
              chrome|firefox|edge)
                ;;
              *)
                echo "browser_mode=single requires a single browser selection."
                exit 1
                ;;
            esac
          fi

          if [ "${BROWSER_MODE}" = "matrix" ]; then
            case "${BROWSER_SELECTION}" in
              chrome|firefox|edge|chrome-firefox|chrome-edge|firefox-edge|chrome-firefox-edge)
                ;;
              *)
                echo "browser_mode=matrix received unsupported browser selection."
                exit 1
                ;;
            esac
          fi

          echo "suite=${SUITE}" >> "$GITHUB_OUTPUT"
          echo "environment=${ENVIRONMENT}" >> "$GITHUB_OUTPUT"
          echo "execution_mode=${EXECUTION_MODE}" >> "$GITHUB_OUTPUT"
          echo "workers=${WORKERS}" >> "$GITHUB_OUTPUT"
          echo "browser_matrix=${BROWSER_MATRIX}" >> "$GITHUB_OUTPUT"

          echo "Resolved suite           : ${SUITE}"
          echo "Resolved environment     : ${ENVIRONMENT}"
          echo "Resolved execution mode  : ${EXECUTION_MODE}"
          echo "Resolved workers         : ${WORKERS}"
          echo "Resolved browser mode    : ${BROWSER_MODE}"
          echo "Resolved browser choice  : ${BROWSER_SELECTION}"
          echo "Resolved browser matrix  : ${BROWSER_MATRIX}"

  parabank-tests:
    name: Run ${{ needs.prepare.outputs.suite }} on ${{ matrix.browser }} (${{ needs.prepare.outputs.execution_mode }})
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.browser_matrix) }}

    env:
      PARABANK_USERNAME: ${{ secrets.PARABANK_USERNAME }}
      PARABANK_PASSWORD: ${{ secrets.PARABANK_PASSWORD }}
      BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
      BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Show Python version
        run: python --version

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install project dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers and system dependencies
        run: python -m playwright install --with-deps

      - name: Validate BrowserStack secrets
        if: ${{ needs.prepare.outputs.execution_mode == 'remote' }}
        shell: bash
        run: |
          if [ -z "${BROWSERSTACK_USERNAME}" ]; then
            echo "BROWSERSTACK_USERNAME is missing."
            exit 1
          fi

          if [ -z "${BROWSERSTACK_ACCESS_KEY}" ]; then
            echo "BROWSERSTACK_ACCESS_KEY is missing."
            exit 1
          fi

      - name: Build BrowserStack metadata
        id: browserstack_meta
        if: ${{ needs.prepare.outputs.execution_mode == 'remote' }}
        shell: bash
        run: |
          SAFE_REF="${GITHUB_REF_NAME//\//-}"
          SAFE_BROWSER="${{ matrix.browser }}"
          BUILD_NAME="gha-${{ needs.prepare.outputs.suite }}-${SAFE_BROWSER}-${SAFE_REF}-run-${GITHUB_RUN_NUMBER}"
          SESSION_NAME="${{ needs.prepare.outputs.suite }}-${SAFE_BROWSER}-attempt-${GITHUB_RUN_ATTEMPT}"
          PROJECT_NAME="Parabank Playwright Framework - GHA"

          echo "project_name=${PROJECT_NAME}" >> "$GITHUB_OUTPUT"
          echo "build_name=${BUILD_NAME}" >> "$GITHUB_OUTPUT"
          echo "session_name=${SESSION_NAME}" >> "$GITHUB_OUTPUT"

      - name: Run selected suite
        shell: bash
        run: |
          SUITE="${{ needs.prepare.outputs.suite }}"
          ENVIRONMENT="${{ needs.prepare.outputs.environment }}"
          BROWSER="${{ matrix.browser }}"
          EXECUTION_MODE="${{ needs.prepare.outputs.execution_mode }}"
          WORKERS="${{ needs.prepare.outputs.workers }}"

          echo "Running suite      : ${SUITE}"
          echo "Environment        : ${ENVIRONMENT}"
          echo "Browser            : ${BROWSER}"
          echo "Execution Mode     : ${EXECUTION_MODE}"
          echo "Workers            : ${WORKERS}"

          EXTRA_ARGS=()
          EXTRA_ARGS+=("--env=${ENVIRONMENT}")
          EXTRA_ARGS+=("--framework-browser=${BROWSER}")
          EXTRA_ARGS+=("--framework-headless=true")
          EXTRA_ARGS+=("--execution-mode=${EXECUTION_MODE}")

          if [ "${EXECUTION_MODE}" = "remote" ]; then
            EXTRA_ARGS+=("--remote-provider=browserstack")
            EXTRA_ARGS+=("--browserstack-project-name=${{ steps.browserstack_meta.outputs.project_name }}")
            EXTRA_ARGS+=("--browserstack-build-name=${{ steps.browserstack_meta.outputs.build_name }}")
            EXTRA_ARGS+=("--browserstack-session-name=${{ steps.browserstack_meta.outputs.session_name }}")
          fi

          if [ "${WORKERS}" != "1" ]; then
            EXTRA_ARGS+=("-n")
            EXTRA_ARGS+=("${WORKERS}")
            EXTRA_ARGS+=("--dist=loadfile")
          fi

          case "${SUITE}" in
            smoke)
              python src/test/python/runners/smoke_runner.py "${EXTRA_ARGS[@]}"
              ;;
            regression)
              python src/test/python/runners/regression_runner.py "${EXTRA_ARGS[@]}"
              ;;
            sanity)
              python src/test/python/runners/sanity_runner.py "${EXTRA_ARGS[@]}"
              ;;
            ui)
              python src/test/python/runners/ui_runner.py "${EXTRA_ARGS[@]}"
              ;;
            api)
              python src/test/python/runners/api_runner.py "${EXTRA_ARGS[@]}"
              ;;
            hybrid)
              python src/test/python/runners/hybrid_runner.py "${EXTRA_ARGS[@]}"
              ;;
            *)
              echo "Unsupported suite: ${SUITE}"
              exit 1
              ;;
          esac

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: html-report-${{ needs.prepare.outputs.suite }}-${{ matrix.browser }}-${{ needs.prepare.outputs.execution_mode }}-${{ github.run_number }}
          path: test-output/reports/
          if-no-files-found: warn
          retention-days: 7

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ needs.prepare.outputs.suite }}-${{ matrix.browser }}-${{ needs.prepare.outputs.execution_mode }}-${{ github.run_number }}
          path: test-output/allure-results/
          if-no-files-found: warn
          retention-days: 7

      - name: Upload traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: traces-${{ needs.prepare.outputs.suite }}-${{ matrix.browser }}-${{ needs.prepare.outputs.execution_mode }}-${{ github.run_number }}
          path: test-output/traces/
          if-no-files-found: warn
          retention-days: 7

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ needs.prepare.outputs.suite }}-${{ matrix.browser }}-${{ needs.prepare.outputs.execution_mode }}-${{ github.run_number }}
          path: test-output/screenshots/
          if-no-files-found: warn
          retention-days: 7

      - name: Publish workflow summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Parabank CI Summary"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Suite | ${{ needs.prepare.outputs.suite }} |"
            echo "| Environment | ${{ needs.prepare.outputs.environment }} |"
            echo "| Browser | ${{ matrix.browser }} |"
            echo "| Execution Mode | ${{ needs.prepare.outputs.execution_mode }} |"
            echo "| Workers | ${{ needs.prepare.outputs.workers }} |"
            if [ "${{ needs.prepare.outputs.execution_mode }}" = "remote" ]; then
              echo "| BrowserStack Project | ${{ steps.browserstack_meta.outputs.project_name }} |"
              echo "| BrowserStack Build | ${{ steps.browserstack_meta.outputs.build_name }} |"
              echo "| BrowserStack Session | ${{ steps.browserstack_meta.outputs.session_name }} |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  build-html-report-site:
    name: Build HTML report site
    needs:
      - prepare
      - parabank-tests
    if: ${{ always() && github.event_name != 'pull_request' && github.ref_name == github.event.repository.default_branch }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages-html
      url: ${{ format('https://{0}.github.io/{1}/reports/run-{2}/html/', github.repository_owner, github.event.repository.name, github.run_number) }}

    steps:
      - name: Download HTML report artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-html-reports
          pattern: html-report-${{ needs.prepare.outputs.suite }}-*-${{ needs.prepare.outputs.execution_mode }}-${{ github.run_number }}
          merge-multiple: false

      - name: Build static HTML site fragment
        shell: bash
        run: |
          set -euo pipefail

          SITE_DIR="html-pages-site"
          REPORT_ROOT="${SITE_DIR}/reports"
          RUN_ROOT="${REPORT_ROOT}/run-${GITHUB_RUN_NUMBER}"
          HTML_ROOT="${RUN_ROOT}/html"
          LATEST_HTML_ROOT="${REPORT_ROOT}/latest/html"

          mkdir -p "${HTML_ROOT}"
          mkdir -p "${LATEST_HTML_ROOT}"
          touch "${SITE_DIR}/.nojekyll"

          shopt -s nullglob
          for artifact_dir in downloaded-html-reports/*; do
            if [ -d "${artifact_dir}" ]; then
              artifact_name="$(basename "${artifact_dir}")"
              browser="$(echo "${artifact_name}" | awk -F- '{print $(NF-2)}')"

              mkdir -p "${HTML_ROOT}/${browser}"
              mkdir -p "${LATEST_HTML_ROOT}/${browser}"

              cp -R "${artifact_dir}/." "${HTML_ROOT}/${browser}/"
              rm -rf "${LATEST_HTML_ROOT:?}/${browser}"
              cp -R "${artifact_dir}" "${LATEST_HTML_ROOT}/${browser}"
            fi
          done

          {
            echo '<!DOCTYPE html>'
            echo '<html lang="en">'
            echo '<head>'
            echo '  <meta charset="UTF-8">'
            echo '  <meta name="viewport" content="width=device-width, initial-scale=1.0">'
            echo "  <title>HTML Reports - Run ${GITHUB_RUN_NUMBER}</title>"
            echo '  <style>'
            echo '    body { font-family: Arial, sans-serif; margin: 40px; background: #f7f7f7; color: #222; }'
            echo '    .card { background: #fff; padding: 24px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); max-width: 960px; }'
            echo '    a { color: #0b57d0; text-decoration: none; }'
            echo '    a:hover { text-decoration: underline; }'
            echo '    ul { line-height: 1.9; }'
            echo '  </style>'
            echo '</head>'
            echo '<body>'
            echo '  <div class="card">'
            echo "    <h1>HTML Reports - Run ${GITHUB_RUN_NUMBER}</h1>"
            echo '    <ul>'
            for browser_dir in "${HTML_ROOT}"/*; do
              if [ -d "${browser_dir}" ]; then
                browser_name="$(basename "${browser_dir}")"
                echo "      <li><a href=\"./${browser_name}/report.html\">${browser_name}</a></li>"
              fi
            done
            echo '    </ul>'
            echo '  </div>'
            echo '</body>'
            echo '</html>'
          } > "${HTML_ROOT}/index.html"

          cp "${HTML_ROOT}/index.html" "${LATEST_HTML_ROOT}/index.html"

      - name: Upload HTML Pages fragment
        uses: actions/upload-artifact@v4
        with:
          name: html-pages-fragment
          path: html-pages-site
          if-no-files-found: error
          retention-days: 7

      - name: Publish HTML link to workflow summary
        shell: bash
        run: |
          URL="https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY#*/}/reports/run-${GITHUB_RUN_NUMBER}/html/"
          {
            echo ""
            echo "## HTML Report"
            echo ""
            echo "- HTML report URL: ${URL}"
          } >> "$GITHUB_STEP_SUMMARY"

  build-allure-report-site:
    name: Build Allure report site
    needs:
      - prepare
      - parabank-tests
    if: ${{ always() && github.event_name != 'pull_request' && github.ref_name == github.event.repository.default_branch }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages-allure
      url: ${{ format('https://{0}.github.io/{1}/reports/run-{2}/allure/', github.repository_owner, github.event.repository.name, github.run_number) }}

    steps:
      - name: Download Allure result artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-allure-results
          pattern: allure-results-${{ needs.prepare.outputs.suite }}-*-${{ needs.prepare.outputs.execution_mode }}-${{ github.run_number }}
          merge-multiple: false

      - name: Set up Java for Allure
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Allure CLI
        shell: bash
        run: |
          npm install -g allure-commandline --unsafe-perm=true
          allure --version

      - name: Build static Allure site fragment
        shell: bash
        run: |
          set -euo pipefail

          SITE_DIR="allure-pages-site"
          REPORT_ROOT="${SITE_DIR}/reports"
          RUN_ROOT="${REPORT_ROOT}/run-${GITHUB_RUN_NUMBER}"
          ALLURE_ROOT="${RUN_ROOT}/allure"
          LATEST_ALLURE_ROOT="${REPORT_ROOT}/latest/allure"

          mkdir -p "${ALLURE_ROOT}"
          mkdir -p "${LATEST_ALLURE_ROOT}"
          touch "${SITE_DIR}/.nojekyll"

          shopt -s nullglob
          for artifact_dir in downloaded-allure-results/*; do
            if [ -d "${artifact_dir}" ]; then
              artifact_name="$(basename "${artifact_dir}")"
              browser="$(echo "${artifact_name}" | awk -F- '{print $(NF-2)}')"

              mkdir -p "${ALLURE_ROOT}/${browser}"
              allure generate "${artifact_dir}" --clean -o "${ALLURE_ROOT}/${browser}"

              rm -rf "${LATEST_ALLURE_ROOT:?}/${browser}"
              mkdir -p "${LATEST_ALLURE_ROOT}"
              cp -R "${ALLURE_ROOT}/${browser}" "${LATEST_ALLURE_ROOT}/${browser}"
            fi
          done

          {
            echo '<!DOCTYPE html>'
            echo '<html lang="en">'
            echo '<head>'
            echo '  <meta charset="UTF-8">'
            echo '  <meta name="viewport" content="width=device-width, initial-scale=1.0">'
            echo "  <title>Allure Reports - Run ${GITHUB_RUN_NUMBER}</title>"
            echo '  <style>'
            echo '    body { font-family: Arial, sans-serif; margin: 40px; background: #f7f7f7; color: #222; }'
            echo '    .card { background: #fff; padding: 24px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); max-width: 960px; }'
            echo '    a { color: #0b57d0; text-decoration: none; }'
            echo '    a:hover { text-decoration: underline; }'
            echo '    ul { line-height: 1.9; }'
            echo '  </style>'
            echo '</head>'
            echo '<body>'
            echo '  <div class="card">'
            echo "    <h1>Allure Reports - Run ${GITHUB_RUN_NUMBER}</h1>"
            echo '    <ul>'
            for browser_dir in "${ALLURE_ROOT}"/*; do
              if [ -d "${browser_dir}" ]; then
                browser_name="$(basename "${browser_dir}")"
                echo "      <li><a href=\"./${browser_name}/index.html\">${browser_name}</a></li>"
              fi
            done
            echo '    </ul>'
            echo '  </div>'
            echo '</body>'
            echo '</html>'
          } > "${ALLURE_ROOT}/index.html"

          cp "${ALLURE_ROOT}/index.html" "${LATEST_ALLURE_ROOT}/index.html"

      - name: Upload Allure Pages fragment
        uses: actions/upload-artifact@v4
        with:
          name: allure-pages-fragment
          path: allure-pages-site
          if-no-files-found: error
          retention-days: 7

      - name: Publish Allure link to workflow summary
        shell: bash
        run: |
          URL="https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY#*/}/reports/run-${GITHUB_RUN_NUMBER}/allure/"
          {
            echo ""
            echo "## Allure Report"
            echo ""
            echo "- Allure report URL: ${URL}"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-reports-site:
    name: Deploy reports site
    needs:
      - prepare
      - build-html-report-site
      - build-allure-report-site
    if: ${{ always() && github.event_name != 'pull_request' && github.ref_name == github.event.repository.default_branch }}
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write
      contents: read

    environment:
      name: github-pages
      url: ${{ format('{0}reports/run-{1}/', steps.deployment.outputs.page_url, github.run_number) }}

    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Download HTML Pages fragment
        uses: actions/download-artifact@v4
        with:
          name: html-pages-fragment
          path: pages-input/html

      - name: Download Allure Pages fragment
        uses: actions/download-artifact@v4
        with:
          name: allure-pages-fragment
          path: pages-input/allure

      - name: Merge Pages site content
        shell: bash
        run: |
          set -euo pipefail

          SITE_DIR="pages-site"
          mkdir -p "${SITE_DIR}"

          cp -R pages-input/html/. "${SITE_DIR}/"
          cp -R pages-input/allure/. "${SITE_DIR}/"

          REPORT_ROOT="${SITE_DIR}/reports"
          RUN_ROOT="${REPORT_ROOT}/run-${GITHUB_RUN_NUMBER}"
          LATEST_ROOT="${REPORT_ROOT}/latest"

          mkdir -p "${RUN_ROOT}"
          mkdir -p "${LATEST_ROOT}"
          touch "${SITE_DIR}/.nojekyll"

          {
            echo '<!DOCTYPE html>'
            echo '<html lang="en">'
            echo '<head>'
            echo '  <meta charset="UTF-8">'
            echo '  <meta name="viewport" content="width=device-width, initial-scale=1.0">'
            echo "  <title>Parabank Reports - Run ${GITHUB_RUN_NUMBER}</title>"
            echo '  <style>'
            echo '    body { font-family: Arial, sans-serif; margin: 40px; background: #f7f7f7; color: #222; }'
            echo '    .card { background: #fff; padding: 24px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); max-width: 960px; }'
            echo '    a { color: #0b57d0; text-decoration: none; }'
            echo '    a:hover { text-decoration: underline; }'
            echo '    ul { line-height: 1.9; }'
            echo '  </style>'
            echo '</head>'
            echo '<body>'
            echo '  <div class="card">'
            echo "    <h1>Parabank Playwright Reports - Run ${GITHUB_RUN_NUMBER}</h1>"
            echo '    <ul>'
            echo '      <li><a href="./html/index.html">HTML Reports</a></li>'
            echo '      <li><a href="./allure/index.html">Allure Reports</a></li>'
            echo '    </ul>'
            echo '  </div>'
            echo '</body>'
            echo '</html>'
          } > "${RUN_ROOT}/index.html"

          {
            echo '<!DOCTYPE html>'
            echo '<html lang="en">'
            echo '<head>'
            echo '  <meta charset="UTF-8">'
            echo '  <meta name="viewport" content="width=device-width, initial-scale=1.0">'
            echo '  <title>Latest Parabank Reports</title>'
            echo '  <style>'
            echo '    body { font-family: Arial, sans-serif; margin: 40px; background: #f7f7f7; color: #222; }'
            echo '    .card { background: #fff; padding: 24px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); max-width: 960px; }'
            echo '    a { color: #0b57d0; text-decoration: none; }'
            echo '    a:hover { text-decoration: underline; }'
            echo '    ul { line-height: 1.9; }'
            echo '  </style>'
            echo '</head>'
            echo '<body>'
            echo '  <div class="card">'
            echo '    <h1>Latest Parabank Playwright Reports</h1>'
            echo '    <ul>'
            echo '      <li><a href="./html/index.html">Latest HTML Reports</a></li>'
            echo '      <li><a href="./allure/index.html">Latest Allure Reports</a></li>'
            echo '    </ul>'
            echo '  </div>'
            echo '</body>'
            echo '</html>'
          } > "${LATEST_ROOT}/index.html"

          {
            echo '<!DOCTYPE html>'
            echo '<html lang="en">'
            echo '<head>'
            echo '  <meta charset="UTF-8">'
            echo '  <meta name="viewport" content="width=device-width, initial-scale=1.0">'
            echo '  <title>Parabank Playwright Reports</title>'
            echo '  <style>'
            echo '    body { font-family: Arial, sans-serif; margin: 40px; background: #f7f7f7; color: #222; }'
            echo '    .card { background: #fff; padding: 24px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); max-width: 960px; }'
            echo '    a { color: #0b57d0; text-decoration: none; }'
            echo '    a:hover { text-decoration: underline; }'
            echo '    ul { line-height: 1.9; }'
            echo '  </style>'
            echo '</head>'
            echo '<body>'
            echo '  <div class="card">'
            echo '    <h1>Parabank Playwright Reports</h1>'
            echo '    <ul>'
            echo '      <li><a href="./reports/latest/">Latest Reports</a></li>'
            echo "      <li><a href=\"./reports/run-${GITHUB_RUN_NUMBER}/\">Run ${GITHUB_RUN_NUMBER}</a></li>"
            echo "      <li><a href=\"./reports/run-${GITHUB_RUN_NUMBER}/html/\">Run ${GITHUB_RUN_NUMBER} HTML Reports</a></li>"
            echo "      <li><a href=\"./reports/run-${GITHUB_RUN_NUMBER}/allure/\">Run ${GITHUB_RUN_NUMBER} Allure Reports</a></li>"
            echo '    </ul>'
            echo '  </div>'
            echo '</body>'
            echo '</html>'
          } > "${SITE_DIR}/index.html"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Publish Pages links to workflow summary
        shell: bash
        run: |
          ROOT_URL="${{ steps.deployment.outputs.page_url }}"
          RUN_URL="${ROOT_URL}reports/run-${{ github.run_number }}/"
          HTML_URL="${ROOT_URL}reports/run-${{ github.run_number }}/html/"
          ALLURE_URL="${ROOT_URL}reports/run-${{ github.run_number }}/allure/"
          LATEST_URL="${ROOT_URL}reports/latest/"

          {
            echo ""
            echo "## GitHub Pages Reports"
            echo ""
            echo "- Run landing page: ${RUN_URL}"
            echo "- HTML report: ${HTML_URL}"
            echo "- Allure report: ${ALLURE_URL}"
            echo "- Latest reports: ${LATEST_URL}"
          } >> "$GITHUB_STEP_SUMMARY"